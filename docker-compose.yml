version: "3.9"

# ════════════════════════════════════════════════════════════════════
#  DataFlow Studio — Docker Compose
#  Usage:
#    docker compose up --build     # first-time build
#    docker compose up -d          # start in background
#    docker compose logs -f        # tail logs
#    docker compose down           # stop
# ════════════════════════════════════════════════════════════════════

services:
  app:
    build:
      context: .
      target: production
    container_name: dataflow-studio
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - dataflow-db:/tmp
    environment:
      - ENVIRONMENT=development
      - DEBUG=false
      - PORT=5000
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5000
    env_file:
      - .env.example
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  dataflow-db:
